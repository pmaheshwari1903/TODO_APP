<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO APP</title>
    <link rel="stylesheet" href="todo_style.css">
</head>

<body>
    <section class="to-do-box">
        <div class="box">
            <h2>📝 Todo App</h2>

            <div class="taking-input">
                <div class="task-text">
                    <label for="taskInput">Task:</label>
                    <input id="taskInput" type="text" placeholder="Enter your task...">
                </div>
                <button id="addButton" class="add-btn">Add</button>
            </div>

            <div id="todoContainer" class="showing-output">
                <ul class="ul-list-class">
                </ul>
            </div>
        </div>
    </section>
    <script src="todo_Script.js"></script>
</body>

</html>
